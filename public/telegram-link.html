<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vincular Telegram - CashApp</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #09090b;
      color: #e4e4e7;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .card {
      background: #18181b;
      border: 1px solid #27272a;
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 400px;
    }
    h1 { font-size: 20px; margin-bottom: 8px; }
    p { color: #a1a1aa; font-size: 14px; margin-bottom: 24px; }
    label { display: block; font-size: 14px; font-weight: 500; margin-bottom: 6px; color: #d4d4d8; }
    input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #27272a;
      border-radius: 8px;
      background: #09090b;
      color: #e4e4e7;
      font-size: 16px;
      margin-bottom: 16px;
      outline: none;
    }
    input:focus { border-color: #863bff; }
    button {
      width: 100%;
      padding: 12px;
      background: #863bff;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #7028e0; }
    button:disabled { opacity: 0.5; cursor: default; }
    .error { color: #ef4444; font-size: 14px; margin-top: 12px; }
    .success { color: #22c55e; font-size: 14px; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🔗 Vincular Telegram</h1>
    <p>Insira o código gerado no Telegram e seu email do CashApp.</p>
    <form id="form">
      <label for="code">Código</label>
      <input type="text" id="code" placeholder="Ex: ABC123" required autocomplete="off" />
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="seu@email.com" required />
      <button type="submit">Vincular</button>
    </form>
    <div id="msg"></div>
  </div>
  <script>
    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault()
      const code = document.getElementById('code').value.trim().toUpperCase()
      const email = document.getElementById('email').value.trim()
      const btn = document.querySelector('button')
      const msg = document.getElementById('msg')
      btn.disabled = true
      btn.textContent = 'Vinculando...'
      msg.className = ''
      msg.textContent = ''
      try {
        const res = await fetch('/api/telegram/claim-code', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ code, email })
        })
        const data = await res.json()
        if (res.ok) {
          msg.className = 'success'
          msg.textContent = '✅ Conta vinculada com sucesso! Agora é só usar o bot do Telegram.'
          document.getElementById('form').style.display = 'none'
        } else {
          msg.className = 'error'
          msg.textContent = '❌ ' + (data.error || 'Erro ao vincular')
        }
      } catch {
        msg.className = 'error'
        msg.textContent = '❌ Erro de conexão. Tente novamente.'
      }
      btn.disabled = false
      btn.textContent = 'Vincular'
    })
  </script>
</body>
</html>
